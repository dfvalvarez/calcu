name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool libtool-bin m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build \
            libjpeg-dev libpng-dev
          
          # Forzar la instalación y actualización de macros del sistema
          sudo aclocal --install || true
          sudo libtoolize --force --copy --quiet || true

      - name: Install Buildozer and Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Forzamos una versión estable de Cython compatible con Kivy
          pip install "cython<3.0.0" buildozer virtualenv pycparser

      - name: Limpiar compilaciones corruptas previas (Caché vieja)
        run: |
          rm -rf .buildozer/android/platform/build-arm64-v8a_armeabi-v7a
          rm -rf .buildozer/android/platform/python-for-android
          mkdir -p ~/.buildozer

      - name: Build APK
        run: |
          set -o pipefail
          yes | buildozer android debug 2>&1 | tee build.log
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: bin/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
