name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libstdc++-12-dev \
            autoconf automake libtool libtool-bin m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build \
            libjpeg-dev libpng-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3.0.0"
          pip install virtualenv pycparser
          pip install python-for-android
          pip install buildozer

      - name: Configure Android SDK, NDK and Pre-accept Buildozer Licenses
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"

          # 1. Aceptar las licencias en el SDK del sistema
          yes | "${SDKMANAGER}" --licenses || true

          # 2. Crear ANTICIPADAMENTE la carpeta de licencias en la ruta exacta donde Buildozer las buscará
          BUILDOZER_LICENSE_DIR="/home/runner/.buildozer/android/platform/android-sdk/licenses"
          mkdir -p "$BUILDOZER_LICENSE_DIR"

          # 3. Copiar las licencias del sistema directamente a la estructura de Buildozer
          if [ -d "${ANDROID_SDK_ROOT}/licenses" ]; then
            cp -r "${ANDROID_SDK_ROOT}/licenses/"* "$BUILDOZER_LICENSE_DIR/"
          fi

          # 4. Exportar variables de entorno para asegurar consistencia
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Clean previous local build artifacts
        run: |
          # Limpiamos bin, pero dejamos intacto el SDK para que conserve las licencias inyectadas
          rm -rf bin

      - name: Build APK
        run: |
          # Ejecutamos buildozer. Al ver las licencias ya aprobadas en su carpeta, no se detendrá.
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: bin/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/android/platform/build-*/build/other_builds/
          if-no-files-found: ignore
