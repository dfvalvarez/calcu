name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libstdc++-12-dev \
            autoconf automake libtool libtool-bin m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build \
            libjpeg-dev libpng-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3.0.0"
          pip install virtualenv pycparser
          pip install python-for-android
          pip install buildozer

      - name: Configure Android SDK, NDK and Pre-accept Licenses
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"

          # 1. Aceptar las licencias en el SDK del sistema
          yes | "${SDKMANAGER}" --licenses || true

          # 2. Exportar las rutas globales para que Buildozer las use directamente
          # Esto evita que intente recrear el SDK dentro de su propia carpeta .buildozer
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV
          
          # Forzar a python-for-android/buildozer a apuntar al SDK correcto mediante variables de sistema
          echo "P4A_ANDROID_SDK=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "P4A_ANDROID_NDK=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Clean previous local build artifacts
        run: |
          rm -rf bin

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/25.2.9519653
        run: |
          # Ejecutamos la compilación pasándole explícitamente las rutas correctas del SDK
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: bin/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/android/platform/build-*/build/other_builds/
          if-no-files-found: ignore
