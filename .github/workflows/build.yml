name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libstdc++-12-dev \
            autoconf automake libtool libtool-bin m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build \
            libjpeg-dev libpng-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3.0.0"
          pip install virtualenv pycparser
          pip install python-for-android
          pip install buildozer

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Clean previous local build artifacts
        run: |
          rm -rf .buildozer/android/platform/build-*
          rm -rf bin

      - name: Pre-accept Android SDK licenses in Buildozer's own path
        # CAUSA RAÍZ IDENTIFICADA EN EL LOG:
        # Buildozer descarga su propio SDK en ~/.buildozer/android/platform/android-sdk
        # y su propio NDK en ~/.buildozer/android/platform/android-ndk-r25b
        # Los pasos anteriores aceptaban licencias en /usr/local/lib/android/sdk,
        # que buildozer IGNORA completamente.
        #
        # SOLUCIÓN: escribir los hashes de licencia directamente en la ruta
        # que buildozer usa, ANTES de que arranque el build.
        run: |
          BUILDOZER_SDK="${HOME}/.buildozer/android/platform/android-sdk"
          LICENSES_DIR="${BUILDOZER_SDK}/licenses"
          mkdir -p "${LICENSES_DIR}"

          # Licencia estándar de Android SDK (cubre build-tools, platforms, etc.)
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n' \
            > "${LICENSES_DIR}/android-sdk-license"

          # Licencia de Android SDK Preview
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd\n' \
            > "${LICENSES_DIR}/android-sdk-preview-license"

          # Licencia de repositorio de extensiones de Android
          printf '\nd975f751698a77b662f1254ddbeed3901e976f5a\n' \
            > "${LICENSES_DIR}/intel-android-extra-license"

          # Licencia de Android SDK ARM EABI v7a System Image
          printf '\n33b6937e604e51b16bce37f2067f23e5a41e6625\n' \
            > "${LICENSES_DIR}/android-sdk-arm-dbt-license"

          echo "Licencias escritas en: ${LICENSES_DIR}"
          ls -la "${LICENSES_DIR}"

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: bin/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/android/platform/build-*/build/other_builds/
          if-no-files-found: ignore
