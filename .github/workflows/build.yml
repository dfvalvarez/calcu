name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libstdc++-12-dev \
            autoconf automake libtool libtool-bin m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build \
            libjpeg-dev libpng-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3.0.0"
          pip install virtualenv pycparser
          pip install python-for-android
          pip install buildozer

      - name: Pre-configure Buildozer SDK and Enforce Licenses
        run: |
          # 1. Definir rutas del SDK global preinstalado de GitHub
          SYSTEM_SDK="/usr/local/lib/android/sdk"
          SYSTEM_SDKMANAGER="${SYSTEM_SDK}/cmdline-tools/latest/bin/sdkmanager"
          
          # 2. Aceptar licencias globales del sistema
          yes | "$SYSTEM_SDKMANAGER" --licenses || true
          
          # 3. Crear de antemano toda la estructura de carpetas local que Buildozer espera encontrar
          LOCAL_SDK_DIR="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "${LOCAL_SDK_DIR}/tools/bin"
          mkdir -p "${LOCAL_SDK_DIR}/licenses"
          
          # 4. Copiar las licencias aprobadas directamente al entorno local de Buildozer
          cp -r ${SYSTEM_SDK}/licenses/* "${LOCAL_SDK_DIR}/licenses/" || true
          
          # 5. EL TRUCO CLAVE: Crear un enlace simbólico (acceso directo) del sdkmanager moderno 
          # en la ruta antigua que Buildozer está buscando desesperadamente
          ln -s "$SYSTEM_SDKMANAGER" "${LOCAL_SDK_DIR}/tools/bin/sdkmanager" || true

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Clean previous local build artifacts
        run: |
          rm -rf bin

      - name: Build APK
        run: |
          # Ahora, cuando Buildozer busque en su carpeta local, encontrará el sdkmanager enlazado y las licencias listas
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: bin/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/android/platform/build-*/build/other_builds/
          if-no-files-found: ignore
