name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libstdc++-12-dev \
            autoconf automake libtool libtool-bin m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build \
            libjpeg-dev libpng-dev \
            libffi-dev python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3.0.0"
          pip install virtualenv pycparser
          pip install python-for-android
          pip install buildozer

      - name: Clean previous local build artifacts
        run: |
          # Esto borra cualquier residuo corrupto de compilaciones anteriores
          rm -rf bin
          rm -rf .buildozer

      - name: Build APK with Buildozer
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: bin/*.apk
