name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libstdc++-12-dev \
            autoconf automake libtool libtool-bin m4 \
            pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev \
            cmake ninja-build \
            libjpeg-dev libpng-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3.0.0"
          pip install virtualenv pycparser
          pip install python-for-android
          pip install buildozer

      - name: Accept ALL Android SDK licenses and pre-install build-tools
        # SOLUCIÓN DEFINITIVA al error de licencias:
        # El problema es que buildozer descarga build-tools;37.0.0 en tiempo de
        # compilación, DESPUÉS de que el paso de licencias ya corrió.
        # La solución es una combinación de tres medidas:
        #
        # 1. Preinstalar build-tools 33.0.2 Y 34.0.0 Y las plataformas
        #    necesarias con sdkmanager ANTES de que buildozer arranque.
        # 2. Aceptar todas las licencias con `yes |` de forma no interactiva.
        # 3. Crear el archivo de licencia de build-tools manualmente en disco
        #    como respaldo, para que buildozer no necesite aceptarla en runtime.
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"

          # Paso A: aceptar todas las licencias existentes
          yes | "${SDKMANAGER}" --licenses 2>/dev/null || true

          # Paso B: instalar todos los paquetes que buildozer podría pedir,
          # incluyendo build-tools 33, 34 y 35 para cubrir cualquier versión
          yes | "${SDKMANAGER}" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "build-tools;34.0.0" \
            "build-tools;35.0.0" 2>/dev/null || true

          # Paso C: aceptar licencias nuevamente después de instalar los paquetes
          yes | "${SDKMANAGER}" --licenses 2>/dev/null || true

          # Paso D: escribir los archivos de licencia directamente en disco
          # Esto es el respaldo definitivo: aunque buildozer intente descargar
          # una versión nueva, los hashes de licencia ya estarán aceptados.
          LICENSES_DIR="${ANDROID_SDK_ROOT}/licenses"
          mkdir -p "${LICENSES_DIR}"

          # Hash de la licencia estándar de Android SDK
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" \
            > "${LICENSES_DIR}/android-sdk-license"

          # Hash de la licencia de Android SDK preview
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" \
            > "${LICENSES_DIR}/android-sdk-preview-license"

          # Hash de la licencia de Intel HAXM
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" \
            > "${LICENSES_DIR}/intel-android-extra-license"

          # Exportar variables de entorno para los pasos siguientes
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"                   >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

          # Verificación: confirmar que aidl está disponible
          echo "--- Verificando aidl ---"
          find "${ANDROID_SDK_ROOT}/build-tools" -name "aidl" 2>/dev/null || \
            echo "AVISO: aidl no encontrado aún (buildozer lo buscará en su ruta)"

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Clean previous local build artifacts
        run: |
          rm -rf .buildozer
          rm -rf bin

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: bin/*.apk

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/android/platform/build-*/build/other_builds/
          if-no-files-found: ignore
